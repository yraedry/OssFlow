spring:
  servlet:
    multipart:
      max-request-size: 2MB
      max-file-size: 2MB
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:ossflow}
    username: ${POSTGRES_USER:ossflow}
    password: ${POSTGRES_PASSWORD:ossflow}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    show-sql: false
  flyway:
    enabled: true
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

management:
  health:
    mail:
      enabled: false
