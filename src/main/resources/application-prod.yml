spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:ossflow}
    username: ${POSTGRES_USER:ossflow}
    password: ${POSTGRES_PASSWORD:ossflow}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate           # detecta desfases schema/entidad sin modificar nada
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    show-sql: false
  flyway:
    enabled: true
    # baseline-on-migrate eliminado en prod: en una BD ya inicializada con Flyway
    # este flag es innecesario y puede silenciar migraciones no aplicadas.
    # Mantenlo únicamente la primera vez que se migra una BD legacy sin historial Flyway.
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false
