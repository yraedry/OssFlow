spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false;INIT=CREATE ALIAS IF NOT EXISTS UNACCENT AS 'String unaccent(String s) { return s\; }'
    driver-class-name: org.h2.Driver
    username: sa
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false
  mail:
    host: localhost
    port: 25
    username: test
    password: test
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret
            scope: email,profile
            redirect-uri: "{baseUrl}/oauth2/callback/{registrationId}"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

management:
  health:
    mail:
      enabled: false

auth:
  jwt:
    private-key-path: classpath:certs/private.pem
    public-key-path: classpath:certs/public.pem
    access-token-expiry: 900
    refresh-token-expiry: 604800

app:
  cookie:
    secure: false
    same-site: Lax
    path: /api/auth
  refresh-token:
    expiry: 2592000

logging:
  level:
    com.ossflow: INFO
