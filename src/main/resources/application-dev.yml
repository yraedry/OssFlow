spring:
  datasource:
    url: jdbc:h2:mem:ossflowdb
    driver-class-name: org.h2.Driver
    username: sa
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: false
springdoc:
  swagger-ui:
    enabled: true
logging:
  level:
    com.ossflow: DEBUG
