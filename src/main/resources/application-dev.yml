spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:ossflow_dev}
    username: ${POSTGRES_USER:ossflow}
    password: ${POSTGRES_PASSWORD:ossflow}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
springdoc:
  swagger-ui:
    enabled: true
logging:
  level:
    com.ossflow: DEBUG
