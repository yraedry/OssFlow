spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:ossflow_dev}
    username: ${POSTGRES_USER:ossflow}
    password: ${POSTGRES_PASSWORD:ossflow}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    show-sql: true
  flyway:
    enabled: false

ossflow:
  flyway:
    enabled: true
    baseline-on-migrate: true
springdoc:
  swagger-ui:
    enabled: true

management:
  health:
    mail:
      enabled: false

auth:
  jwt:
    # Para dev local: si no se define AUTH_JWT_PRIVATE_KEY_B64, se intenta leer de filesystem.
    # El archivo está gitignored (src/main/resources/certs/private.pem) — generar localmente.
    private-key-path: file:src/main/resources/certs/private.pem
    public-key-path: file:src/main/resources/certs/public.pem

app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}
  cookie:
    secure: ${APP_COOKIE_SECURE:false}
    same-site: ${APP_COOKIE_SAME_SITE:Lax}
    path: /api/auth
  refresh-token:
    expiry: ${APP_REFRESH_EXPIRY:2592000}

logging:
  level:
    com.ossflow: DEBUG
