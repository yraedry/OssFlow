name: CI

on:
  pull_request:
  push:
    branches: ['**']

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Run tests with coverage
        run: mvn -B verify -Dspring.profiles.active=test

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

      - name: Coverage summary
        if: always()
        run: |
          echo "## Test & Coverage" >> $GITHUB_STEP_SUMMARY
          echo "### Top 10 archivos más largos" >> $GITHUB_STEP_SUMMARY
          find src/main/java -name '*.java' | xargs wc -l | sort -rn | head -10 >> $GITHUB_STEP_SUMMARY

  push-image:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Compute image tag
        id: tag
        run: |
          REF="${GITHUB_REF#refs/heads/}"
          if [ "$REF" = "main" ]; then
            echo "value=main" >> "$GITHUB_OUTPUT"
          else
            SLUG="${REF#feature/}"
            SLUG="${SLUG//\//-}"
            echo "value=${SLUG}-dev" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build JAR
        run: mvn -B package -DskipTests

      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ossflow-backend:${{ steps.tag.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
